<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sizimityper 利用規約 — バージョン履歴</title>
  <style>
    :root {
      --accent: #4a6fa5;
      --accent-light: #e8eef7;
      --text: #1a1a1a;
      --muted: #555;
      --border: #ddd;
      --bg: #fafafa;
      --current-bg: #e6f4ed;
      --current-border: #2a7a4f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
    }
    header {
      background: var(--accent);
      color: #fff;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    header .meta { font-size: 0.9rem; opacity: 0.85; }
    nav.breadcrumb {
      background: var(--accent-light);
      padding: 0.6rem 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    nav.breadcrumb a { color: var(--accent); text-decoration: none; }
    nav.breadcrumb a:hover { text-decoration: underline; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    h2 {
      font-size: 1.25rem;
      color: var(--accent);
      border-left: 4px solid var(--accent);
      padding-left: 0.75rem;
      margin-bottom: 1.2rem;
    }
    .timeline { display: flex; flex-direction: column; gap: 1rem; }
    .entry {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
      display: grid;
      grid-template-columns: 140px 1fr auto;
      gap: 0 1.2rem;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .entry.current {
      border-color: var(--current-border);
      background: var(--current-bg);
    }
    .entry .date { font-size: 0.9rem; color: var(--muted); }
    .entry .info {}
    .entry .info .version {
      font-weight: bold;
      font-size: 1rem;
      color: var(--accent);
    }
    .entry.current .info .version { color: var(--current-border); }
    .entry .info .summary { font-size: 0.85rem; color: var(--muted); margin-top: 0.2rem; }
    .badge-current {
      background: var(--current-border);
      color: #fff;
      border-radius: 4px;
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
      font-weight: bold;
      white-space: nowrap;
    }
    .badge-archived {
      background: #eee;
      color: var(--muted);
      border-radius: 4px;
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
      font-weight: bold;
      white-space: nowrap;
    }
    .link-row {
      grid-column: 1 / -1;
      margin-top: 0.6rem;
      font-size: 0.85rem;
    }
    .link-row a {
      color: var(--accent);
      text-decoration: none;
      margin-right: 1rem;
    }
    .link-row a:hover { text-decoration: underline; }

    .note {
      background: #fff8e1;
      border: 1px solid #f0c040;
      border-radius: 6px;
      padding: 0.8rem 1rem;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 1.5rem;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: #fff;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 580px) {
      .entry { grid-template-columns: 1fr auto; }
      .entry .date { grid-column: 1 / -1; font-size: 0.8rem; margin-bottom: 0.2rem; }
    }
  </style>
</head>
